name: Daily Macro Pulse Report

on:
  schedule:
    # KR | 17:00 KST | 08:00 UTC | Mon-Fri
    - cron: '00 08 * * 1-5'
    # US | 06:30 KST | 21:30 UTC | Tue-Sat KST
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '리포트 모드 선택 (KR 또는 US)'
        required: true
        default: 'US'
        type: choice
        options:
          - KR
          - US

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPORT_FORMAT_CONFIG: config/report_formats.json
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    # [중요] 실행 시간에 따라 MODE를 결정하는 단계 추가
    - name: Set Report Mode
      id: set-mode
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "REPORT_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
        elif [ "${{ github.event.schedule }}" == "30 21 * * 1-5" ]; then
          echo "REPORT_MODE=US" >> $GITHUB_ENV
        else
          echo "REPORT_MODE=KR" >> $GITHUB_ENV
        fi

    - name: Build runtime image
      run: docker build -t macro-pulse:daily .

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:daily \
          sh -lc "uv run --frozen python -m unittest discover tests 2>&1 | tee unit-test.log"

    - name: Run Macro Pulse Bot in Docker
      env:
        REPORT_FORMAT_CONFIG: config/report_formats.json
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MODE: ${{ env.REPORT_MODE || 'US' }}
      run: |
        docker run --rm -e REPORT_FORMAT_CONFIG -e TELEGRAM_BOT_TOKEN -e TELEGRAM_CHAT_ID -e MODE -v "$PWD:/app" -w /app macro-pulse:daily sh -lc "uv run --frozen python src/main.py 2>&1 | tee macro-pulse.log"

    - name: Validate generated report
      if: success()
      run: test -s macro_pulse_report.html

    - name: Prepare public directory
      if: success()
      run: |
        mkdir -p public
        mv macro_pulse_report.html public/index.html

    - name: Configure GitHub Pages
      if: success()
      uses: actions/configure-pages@v5

    - name: Upload GitHub Pages artifact
      if: success()
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./public

    - name: Upload workflow artifacts
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: daily-report-artifacts
        path: |
          macro_pulse_report.html
          public/index.html
          macro-pulse.log
          unit-test.log
        if-no-files-found: ignore

  deploy:
    if: ${{ needs.build.result == 'success' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  notify-failure:
    if: ${{ always() && (needs.build.result == 'failure' || needs.deploy.result == 'failure') }}
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Send failure notification
      if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
      run: |
        curl --silent --show-error --fail \
          --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=Macro Pulse workflow failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
